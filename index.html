<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackvision Leaderboard | Cyber-Neon Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Outfit:wght@800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #05050a;
            --bg-surface: #0a0a15;
            --primary: #bf5af2;
            --secondary: #5ac8fa;
            --accent-pink: #ff2d55;
            --accent-cyan: #00f2fe;
            --text-main: #f5f5f7;
            --text-muted: #86868b;
            --border-glow: rgba(191, 90, 242, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background: 
                radial-gradient(circle at 0% 0%, rgba(191, 90, 242, 0.1), transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(0, 242, 254, 0.1), transparent 40%),
                linear-gradient(to bottom, #05050a 0%, #0a0a15 100%);
        }

        /* Abstract Background Elements */
        .neon-orb {
            position: fixed;
            width: 400px;
            height: 400px;
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }
        .orb-1 { top: -100px; left: -100px; background: var(--primary); }
        .orb-2 { bottom: -100px; right: -100px; background: var(--accent-cyan); }

        /* Header Section */
        .header {
            text-align: center;
            padding: 5rem 1rem 3rem;
            width: 100%;
            max-width: 1200px;
        }

        .club-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-cyan);
            background: rgba(0, 242, 254, 0.1);
            padding: 0.5rem 1.5rem;
            border-radius: 100px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
        }

        .main-title {
            font-family: 'Outfit', sans-serif;
            font-size: clamp(2.2rem, 12vw, 7rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff 20%, var(--primary) 50%, var(--accent-cyan) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(191, 90, 242, 0.3));
            animation: titleShift 8s infinite alternate ease-in-out;
        }

        @keyframes titleShift {
            0% { filter: drop-shadow(0 0 20px rgba(191, 90, 242, 0.3)); }
            100% { filter: drop-shadow(0 0 40px rgba(0, 242, 254, 0.4)); }
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.25rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* Leaderboard Container */
        .container {
            width: 95%;
            max-width: 1100px;
            margin-bottom: 5rem;
            animation: containerSlide 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes containerSlide {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .leaderboard-card {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 32px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
            box-shadow: 
                0 40px 100px -20px rgba(0, 0, 0, 0.8),
                inset 0 1px 1px rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .table-scroll {
            overflow-x: auto;
            border-radius: 31px;
            background: var(--bg-surface);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            text-align: left;
        }

        thead th {
            padding: 2rem 1.5rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-weight: 700;
        }

        tbody tr {
            transition: all 0.3s ease;
            cursor: default;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
            transform: scale(1.002);
        }

        td {
            padding: 1.5rem;
            font-size: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            vertical-align: middle;
            background: inherit;
        }

        /* sticky first column on mobile */
        @media (max-width: 768px) {
            th:first-child, td:first-child {
                position: sticky !important;
                left: 0 !important;
                z-index: 50 !important;
                background-color: var(--bg-surface) !important;
                box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            }
            
            th:first-child {
                z-index: 51 !important;
            }
        }

        /* Rank & Team Columns */
        .rank-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            font-weight: 800;
            margin-right: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            font-family: 'JetBrains Mono', monospace;
        }

        .team-name {
            font-weight: 700;
            color: var(--text-main);
            font-size: 1.1rem;
        }

        /* Medals Rendering */
        tr:nth-child(1) .rank-box {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
            transform: scale(1.1);
        }
        tr:nth-child(2) .rank-box {
            background: linear-gradient(135deg, #E0E0E0, #9E9E9E);
            color: #000;
            box-shadow: 0 0 20px rgba(224, 224, 224, 0.2);
        }
        tr:nth-child(3) .rank-box {
            background: linear-gradient(135deg, #CD7F32, #8B4513);
            color: #000;
            box-shadow: 0 0 20px rgba(205, 127, 50, 0.2);
        }

        .score-val {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-muted);
        }

        .total-val {
            font-weight: 900;
            color: var(--accent-cyan);
            font-size: 1.25rem;
            font-family: 'Outfit', sans-serif;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        /* Scrollbar aesthetics */
        .table-scroll::-webkit-scrollbar { height: 6px; }
        .table-scroll::-webkit-scrollbar-track { background: var(--bg-surface); }
        .table-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        @media (max-width: 768px) {
            .header { padding: 4rem 1rem 2rem; }
            .subtitle { font-size: 1rem; }
            thead th { 
                padding: 1rem 0.75rem; 
                font-size: 0.65rem; 
                letter-spacing: 1px;
            }
            td { padding: 1rem 0.75rem; }
            .rank-box { width: 28px; height: 28px; margin-right: 0.5rem; font-size: 0.75rem; border-radius: 8px; }
            .team-name { font-size: 0.85rem; }
            .total-val { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="neon-orb orb-1"></div>
    <div class="neon-orb orb-2"></div>

    <header class="header">
        <span class="club-tag">BCA-O-CRATES Club | GLA University</span>
        <h1 class="main-title">HACKVISION</h1>
        <p class="subtitle">Live Leaderboard</p>
    </header>

    <main class="container">
        <div class="leaderboard-card">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Rank & Team</th>
                            <th>UI/UX</th>
                            <th>Innov.</th>
                            <th>Func.</th>
                            <th>Teamwork</th>
                            <th>Pres.</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Data will be injected here by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const teams = [
            { name: "Apex Unit", ui: 8, innovation: 7, functionality: 8, teamwork: 8, presentation: 7, total: 38 },
            { name: "Brainstormers", ui: 6, innovation: 7, functionality: 5, teamwork: 6, presentation: 7, total: 31 },
            { name: "Byte Karma", ui: 7, innovation: 8, functionality: 5, teamwork: 7, presentation: 8, total: 35 },
            { name: "Byte Verse", ui: 9, innovation: 7, functionality: 8, teamwork: 6, presentation: 7, total: 37 },
            { name: "Circuit Squad", ui: 8, innovation: 6, functionality: 6, teamwork: 8, presentation: 8, total: 36 },
            { name: "Code Burster", ui: 7, innovation: 8, functionality: 5, teamwork: 7, presentation: 6, total: 33 },
            { name: "Code Crafters", ui: 8, innovation: 8, functionality: 10, teamwork: 9, presentation: 10, total: 45 },
            { name: "Code Ninjas", ui: 9, innovation: 7, functionality: 8, teamwork: 8, presentation: 8, total: 40 },
            { name: "Code Snippet", ui: 9, innovation: 8, functionality: 8, teamwork: 9, presentation: 9, total: 43 },
            { name: "Code storm", ui: 8, innovation: 6, functionality: 9, teamwork: 6, presentation: 8, total: 37 },
            { name: "Code Titans", ui: 7, innovation: 4, functionality: 5, teamwork: 3, presentation: 5, total: 24 },
            { name: "Code viberZ", ui: 5, innovation: 6, functionality: 6, teamwork: 6, presentation: 8, total: 31 },
            { name: "Code Vortex", ui: 8, innovation: 8, functionality: 10, teamwork: 9, presentation: 10, total: 45 },
            { name: "Code Warriors", ui: 5, innovation: 6, functionality: 5, teamwork: 4, presentation: 1, total: 21 },
            { name: "Codexa", ui: 8, innovation: 6, functionality: 6, teamwork: 5, presentation: 6, total: 31 },
            { name: "Cyber knights", ui: 8, innovation: 7, functionality: 8, teamwork: 9, presentation: 8, total: 40 },
            { name: "Deathly hallows", ui: 7, innovation: 6, functionality: 3, teamwork: 4, presentation: 4, total: 24 },
            { name: "Debug2Ace", ui: 8, innovation: 6, functionality: 6, teamwork: 7, presentation: 2, total: 29 },
            { name: "Digital Destroyerz", ui: 9, innovation: 7, functionality: 6, teamwork: 8, presentation: 5, total: 35 },
            { name: "EKLAVYA", ui: 9, innovation: 7, functionality: 6, teamwork: 6, presentation: 7, total: 35 },
            { name: "CodeXcrew", ui: 6, innovation: 6, functionality: 8, teamwork: 9, presentation: 10, total: 39 },
            { name: "GLA Glitchers", ui: 8, innovation: 6, functionality: 6, teamwork: 5, presentation: 2, total: 27 },
            { name: "Hack N chill", ui: 8, innovation: 6, functionality: 7, teamwork: 8, presentation: 6, total: 35 },
            { name: "Hack Verse", ui: 9, innovation: 9, functionality: 9, teamwork: 9, presentation: 9, total: 45 },
            { name: "HACK4Brix", ui: 7, innovation: 6, functionality: 5, teamwork: 6, presentation: 6, total: 30 },
            { name: "Idea Hakers", ui: 7, innovation: 7, functionality: 5, teamwork: 4, presentation: 5, total: 28 },
            { name: "InnovX", ui: 10, innovation: 9, functionality: 9, teamwork: 7, presentation: 8, total: 43 },
            { name: "King Crafters", ui: 8, innovation: 7, functionality: 5, teamwork: 8, presentation: 8, total: 36 },
            { name: "Neuro Ninjas", ui: 8, innovation: 7, functionality: 9, teamwork: 7, presentation: 10, total: 41 },
            { name: "Runtime terror", ui: 8, innovation: 6, functionality: 5, teamwork: 6, presentation: 7, total: 32 },
            { name: "Squard", ui: 8, innovation: 8, functionality: 7, teamwork: 9, presentation: 6, total: 38 },
            { name: "Team Cypher", ui: 7, innovation: 6, functionality: 8, teamwork: 8, presentation: 8, total: 37 },
            { name: "TEAM vision", ui: 8, innovation: 8, functionality: 9, teamwork: 9, presentation: 8, total: 42 },
            { name: "The Ogs", ui: 9, innovation: 8, functionality: 8, teamwork: 7, presentation: 8, total: 40 },
            { name: "The Visionaries", ui: 8, innovation: 8, functionality: 9, teamwork: 9, presentation: 8, total: 42 },
            { name: "The Warriors", ui: 8, innovation: 7, functionality: 7, teamwork: 7, presentation: 5, total: 34 },
            { name: "Victory Coders", ui: 8, innovation: 6, functionality: 7, teamwork: 9, presentation: 7, total: 37 },
            { name: "VyomX", ui: 6, innovation: 4, functionality: 6, teamwork: 7, presentation: 5, total: 28 },
            { name: "Warrior coders", ui: 9, innovation: 8, functionality: 7, teamwork: 7, presentation: 7, total: 38 }
        ];

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboard-body');
            
            // Sort teams by total in descending order
            const sortedTeams = [...teams].sort((a, b) => b.total - a.total);
            
            tbody.innerHTML = sortedTeams.map((team, index) => `
                <tr style="opacity: 0; transform: translateX(-20px);">
                    <td>
                        <div style="display: flex; align-items: center;">
                            <span class="rank-box">${index + 1}</span>
                            <span class="team-name">${team.name}</span>
                        </div>
                    </td>
                    <td class="score-val">${team.ui}</td>
                    <td class="score-val">${team.innovation}</td>
                    <td class="score-val">${team.functionality}</td>
                    <td class="score-val">${team.teamwork}</td>
                    <td class="score-val">${team.presentation}</td>
                    <td class="total-val">${team.total}</td>
                </tr>
            `).join('');

            // Trigger animations
            setTimeout(() => {
                document.querySelectorAll('tbody tr').forEach((tr, index) => {
                    tr.style.transition = `all 0.6s cubic-bezier(0.23, 1, 0.32, 1) ${0.1 + (index * 0.05)}s`;
                    tr.style.opacity = '1';
                    tr.style.transform = 'translateX(0)';
                });
            }, 50);
        }

        // Initialize
        renderLeaderboard();
    </script>
</body>
</html>
